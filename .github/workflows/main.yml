
name: Deploy Game to Web
on:
  push:
    branches: [ main ] # Change this to 'master' if your main branch is named master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build with Pygbag
        run: |
          pip install pygbag
          # This converts your main.py and assets into a web folder
          python3 -m pygbag --build .

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages # This creates a new branch just for the website
